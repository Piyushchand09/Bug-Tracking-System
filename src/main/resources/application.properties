# Server
server.port=8080

# ===== MySQL Database Config =====
spring.datasource.url=jdbc:mysql://localhost:3306/bug_tracking_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT Config =====
# Base64 encoded secret (change this in production, keep it secret)
app.jwt.secret=YmFvNzM3ZTU4YzQ0MjNiOGZmMzk1ZTk4NmMxNzY0YzViYzQ2ZTk3ZGJlZTQwYWVjZjM5NzQ2ZDU5NjQ0YjJj
# 24 hours in milliseconds
app.jwt.expirationMs=86400000

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.bugtracker=DEBUG
